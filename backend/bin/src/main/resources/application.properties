# ============================================================
#  BNPlatform — Spring Boot configuration
# ============================================================
spring.application.name=bnp-backend
server.port=8080
server.servlet.context-path=/

# ---------- MySQL (Laragon) ----------
spring.datasource.url=jdbc:mysql://localhost:3306/hibernate?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=boot
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---------- JPA / Hibernate ----------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ---------- JWT ----------
# 256-bit base64 secret. Change in production.
bnp.jwt.secret=bmV4dXNfYm5wbGF0Zm9ybV9zdXBlcl9zZWNyZXRfa2V5X2NoYW5nZV9tZV8yMDI2
bnp.jwt.expiration-ms=86400000
bnp.jwt.refresh-expiration-ms=604800000

# ---------- Default super admin (seeded on first run) ----------
bnp.admin.email=admin@bnplatform.com
bnp.admin.password=Admin@123

# ---------- Multipart (document/certificate uploads) ----------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ---------- File storage (avatars, documents, logos) ----------
# Files are stored on disk under this directory and served back at public-path.
bnp.upload.dir=uploads
bnp.upload.public-path=/uploads

# ---------- Swagger ----------
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
