<link rel="stylesheet" href="membership-card.css">
<!-- Reusable membership / plan card.
     Drop into any Bootstrap row column. Pairs with the .price-card styles
     used on pricing.html; minimal fallback styles included so it renders
     standalone too. Duplicate & tweak per plan. -->
<div class="plan-card">
    <span class="plan-card__badge">Most popular</span>
    <h3 class="plan-card__name">Premium</h3>
    <p class="plan-card__tag">For active networkers</p>
    <div class="plan-card__price">₹499<span>/mo</span></div>
    <a href="../pages/membership/subscription.html" class="plan-card__btn">Start Premium</a>
    <ul class="plan-card__list">
        <li><i class="fa-solid fa-check"></i> Everything in Free</li>
        <li><i class="fa-solid fa-check"></i> Map &amp; nearby search</li>
        <li><i class="fa-solid fa-check"></i> Unlimited chat</li>
        <li><i class="fa-solid fa-check"></i> Full contact details</li>
        <li><i class="fa-solid fa-check"></i> Profile analytics</li>
    </ul>
</div>
